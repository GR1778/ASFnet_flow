title: "human36m_single_dlst_ude"
kind: "human36m"
azureroot: ""
batch_output: true
vis_freq: 1000
vis_n_elements: 10

model:
  name: "DepthGuidedPoseDLSTUDE"

  image_shape: [192, 256]
  heatmap_shape: [72, 96]
  heatmap_softmax: true
  heatmap_multiplier: 100.0

  init_weights: false
  checkpoint: ""

  backbone:
    type: "hrnet_32"  # "hrnet_48"

    num_final_layer_channel: 17
    num_joints: 17
    num_layers: 152

    init_weights: true
    fix_weights: true
    checkpoint: "data/pretrained/pose_hrnet_w32_256x192.pth"

  poseformer:
    embed_dim_ratio: 128
    depth: 4
    # DLST hyperparameters (applied before UDE)
    dlst_num_depth_layers: 4
    dlst_num_heads: 8
    dlst_depth: 1
    dlst_drop_path: 0.0
    dlst_assignment_temperature: 1.0
    dlst_omega_temperature: 1.0
    dlst_depth_gate_init: 0.1

loss:
  criterion: "MPJPE"
  # UDE BNN supervision weight (baseline default was 0.00001)
  lambda_ude: 0.00001
  # DLST ordering supervision weight
  lambda_order: 0.001
  order_margin: 0.05
  order_temperature: 1.0
  order_logit_scale: 4.0
  order_auto_unit: true
  scale_keypoints_3d: 0.1

  use_volumetric_ce_loss: true
  volumetric_ce_loss_weight: 0.01

  use_global_attention_loss: True
  global_attention_loss_weight: 1000000

dataset:
  kind: "human36m"
  data_format: ""
  root: "../H36M-Toolbox/images_crop/"
  extra_root: "data/human36m/extra"
  train_labels_path: "data/h36m_train.pkl"
  val_labels_path: "data/h36m_validation.pkl"
  depth_image_path: "../H36M-Toolbox/depth_images/"

train:
  n_objects_per_epoch: 15000
  n_epochs: 30

  batch_size: 64
  accum_iter: 4

  optimizer: 'Adam'
  backbone_lr: 0.0001
  backbone_lr_step: [1000]
  backbone_lr_factor: 0.1
  Lifting_net_lr: 0.00064
  Lifting_net_lr_decay: 0.99

  with_damaged_actions: true
  undistort_images: true

  scale_bbox: 1.0

  shuffle: true
  randomize_n_views: true
  min_n_views: 1
  max_n_views: 1
  num_workers: 14

  limb_length_path: "data/human36m/extra/mean_and_std_limb_length.h5"
  pred_results_path: "data/pretrained/human36m/human36m_alg_10-04-2019/checkpoints/0060/results/train.pkl"

val:
  batch_size: 256

  flip_test: true
  with_damaged_actions: true
  undistort_images: true

  scale_bbox: 1.0

  shuffle: false
  randomize_n_views: true
  min_n_views: 1
  max_n_views: 1
  num_workers: 14
  retain_every_n_frames_in_test: 1

  limb_length_path: "data/human36m/extra/mean_and_std_limb_length.h5"
  pred_results_path: "data/pretrained/human36m/human36m_alg_10-04-2019/checkpoints/0060/results/val.pkl"
